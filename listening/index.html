<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Language Listening App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎧 Listening Practice App</h1>

<select id="lang">
  <option value="en-US" selected>English</option>
  <option value="fr-FR">French</option>
  <option value="id-ID">Indonesian</option>
</select>

<br><br>

<select id="level">
  <option value="ALL">All</option>
  <option value="A1">A1</option>
  <option value="A2">A2</option>
  <option value="B1">B1</option>
  <option value="B2">B2</option>
  <option value="C1">C1</option>
</select>

<hr>

<h2>Question</h2>
<div id="questionText"></div>

<div class="btns">
  <button onclick="playAudio()">▶ Play</button>
  <button onclick="shadowing()">🗣 Shadowing</button>
  <button onclick="stopAudio()">⏹ Stop</button>
  <button onclick="toggleScript()">📖 Script</button>

  <button onclick="toggleTranslation()">🇯🇵 Translation</button>
  <button onclick="nextQuestion()">Next</button>
</div>

<h2>Script</h2>

<div id="scriptBox" class="hidden"></div>
<h2>Japanese Translation</h2>
<div id="translationBox" class="hidden"></div>

<hr>

<h2>Quiz (3 Questions)</h2>
<div id="quiz"></div>

<p id="result"></p>
<p id="scoreBox">Score: 0 / 0</p>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
