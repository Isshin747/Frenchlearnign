<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7032470395981540"
crossorigin="anonymous"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>French Listening Practice</title>

<link rel="stylesheet" href="listening.css">
</head>
<body>

<div class="container">

<h1>French Listening Practice</h1>

<select id="level">
  <option value="ALL">All Levels</option>
  <option value="A1">A1</option>
  <option value="A2">A2</option>
  <option value="B1">B1</option>
  <option value="B2">B2</option>
  <option value="C1">C1</option>
</select>

<hr>



<div class="main-layout">

    <main class="content">

        <h2>Question</h2>

        <div id="questionNumber"></div>
        <div id="questionText"></div>

        <div class="btns">

            <button onclick="playAudio()">Play</button>
            <button onclick="shadowing()">Shadowing</button>
            <button onclick="stopAudio()">Stop</button>
            <button onclick="toggleScript()">Script</button>
            <button onclick="toggleTranslation()">Translation</button>
            <button onclick="nextQuestion()">Next</button>

        </div>

        <h2>Script</h2>
        <div id="scriptBox" class="hidden"></div>

        <h2>Translation</h2>
        <div id="translationBox" class="hidden"></div>

        <hr>

        <h2>Quiz</h2>

        <div id="quiz"></div>

        <p id="result"></p>

        <p id="scoreBox"></p>

    </main>

    <aside class="sidebar">

        <h2>Questions</h2>

        <div id="questionList"></div>

    </aside>

</div>


<script src="listeningquestion.js"></script>
<script src="listening.js"></script>
</body>
</html>
