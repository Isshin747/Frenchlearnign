<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Language Reading Lab</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>📖 Language Reading Lab</h1>
            <p>
                英語・フランス語・インドネシア語の
                リーディング学習
            </p>
        </header>

        <!-- Language Select -->
        <section class="selectors">

            <div class="select-box">
                <label>言語</label>

                <select id="languageSelect">

                    <option value="english">
                        🇬🇧 English
                    </option>

                    <option value="french">
                        🇫🇷 Français
                    </option>

                    <option value="indonesian">
                        🇮🇩 Bahasa Indonesia
                    </option>

                </select>
            </div>

            <div class="select-box">
                <label>レベル</label>

                <select id="levelSelect">

                    <option value="A1">A1</option>
                    <option value="A2">A2</option>
                    <option value="B1" selected>B1</option>
                    <option value="B2">B2</option>
                    <option value="C1">C1</option>

                </select>
            </div>

        </section>

        <button id="loadBtn">
            問題を読み込む
        </button>

        <div id="readingList"
     class="reading-list">
</div>
<button
    id="translationBtn"
    class="secondary-btn"
>
    日本語訳を見る
</button>

<div
    id="translationBox"
    class="translation-box hidden"
></div>
        <!-- Reading -->
        <section
            class="reading-card hidden"
            id="readingCard"
        >

            <h2 id="title"></h2>

            <div id="readingText"
                 class="reading-text">
            </div>

            <!-- Vocabulary -->
            <button
                id="vocabBtn"
                class="secondary-btn"
            >
                難しい単語を見る
            </button>

            <div
                id="vocabBox"
                class="vocab-box hidden"
            ></div>

            <!-- Questions -->
            <div
                id="questionsContainer"
                class="questions"
            ></div>

            <button
                id="submitBtn"
                class="submit-btn"
            >
                答えを確認
            </button>

            <!-- Result -->
            <div
                id="resultContainer"
                class="result"
            ></div>

        </section>

    </div>

    <script src="readings.js"></script>
    <script src="script.js"></script>

</body>
</html>
