<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Speaking Practice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎤 Speaking Practice</h1>

<select id="lang">
    <option value="en-US">English</option>
    <option value="fr-FR">Français</option>
    <option value="id-ID">Bahasa Indonesia</option>
</select>
<select id="level">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<button onclick="showQuestion()">🔄 New Question</button>

<div class="card">
    <h2 id="question"></h2>
   
    <button onclick="startRec()">🎤 Start</button>
    <button onclick="stopRec()">⏹ Stop</button>

    <div id="transcript">Your speech will appear here...</div>

    <button onclick="sendToAI()">🤖 Check Answer</button>

    <div class="result" id="result"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
