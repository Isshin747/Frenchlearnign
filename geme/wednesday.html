<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7032470395981540"
        crossorigin="anonymous">
    </script>

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>ドラマWednesday 英単語</title>

    <link rel="stylesheet" href="gaga.css">
</head>

<body>

<div class="quiz-container">

    <h1>Language Quiz</h1>

    <p class="subtitle">
        ドラマ　Wednesday　英単語
    </p>

    <div class="category-select">

        <button onclick="selectCategory('noun')">
            名詞
        </button>

        <button onclick="selectCategory('verb')">
            動詞
        </button>

        <button onclick="selectCategory('adjective')">
            形容詞
        </button>

        <button onclick="selectCategory('expression')">
            表現
        </button>

        <button onclick="selectCategory('all')">
            全部
        </button>

        <button onclick="location.href='../index.html'">
            トップページへ
        </button>

    </div>

    <div class="score">
        Score:
        <span id="score">0</span>
    </div>

    <div class="question-number"
    id="questionNumber">
        Question 1 / 0
    </div>

    <div class="question"
    id="question">
        カテゴリーを選んでください！
    </div>

    <div class="answers"
    id="answers">
    </div>

    <div class="question-area">
    <h2 id="question"></h2>

    <button id="speakBtn">
        🔊 発音を聞く
    </button>
</div>

    <div id="result"></div>

    <button
    class="next-btn"
    id="nextBtn">
        次の問題 →
    </button>

</div>

<script>
let quizData = [];
let currentQuestion = 0;
let score = 0;
let wrongQuestions = [];

/* --------------------
   問題データ（空）
-------------------- */

const nouns =  [

{question:"『vial』の意味は？",
answers:["薬瓶・小びん","刺し傷","光沢","レンズ"],
correct:0},

{question:"『stab wound』の意味は？",
answers:["火災","刺し傷","復讐","危険な場所"],
correct:1},

{question:"『sheen』の意味は？",
answers:["ちら見","光沢・つや","斧","巡礼者"],
correct:1},

{question:"『glimpse』の意味は？",
answers:["一瞥・ちら見","薬瓶","炎","罠"],
correct:0},

{question:"『lens』の意味は？",
answers:["小屋","復讐","レンズ","仲間"],
correct:2},

{question:"『vengeance』の意味は？",
answers:["復讐","友情","病気","宿"],
correct:0},

{question:"『nail-biter』の意味は？",
answers:["つまらないもの","ハラハラするもの","巡礼者","火事"],
correct:1},

{question:"『death trap』の意味は？",
answers:["小さな家","死の罠・危険な場所","希望","仕事"],
correct:1},

{question:"『blaze』の意味は？",
answers:["炎・火災","レンズ","一瞥","薬瓶"],
correct:0},

{question:"『pilgrim』の意味は？",
answers:["医者","巡礼者","商人","兵士"],
correct:1},

{question:"『hatchet』の意味は？",
answers:["ナイフ","手斧","ハンマー","ロープ"],
correct:1},

{question:"『outcast』の意味は？",
answers:["リーダー","仲間","のけ者","先生"],
correct:2},

{question:"『crap』の意味は？",
answers:["素晴らしい物","くだらないもの","高価な物","秘密"],
correct:1},
];

const verbs = [
{question:"『cover it up』の意味は？",
answers:["助けを求める","隠す・ごまかす","出てくる","自慢する"],
correct:1},

{question:"『brag』の意味は？",
answers:["自慢する","腹を立てる","潜む","燃え盛る"],
correct:0},

{question:"『resent』の意味は？",
answers:["退屈する","腹を立てる・不満に思う","公表する","泊まる"],
correct:1},

{question:"『lodge』の意味は？",
answers:["泊まる","逃げる","壊す","笑う"],
correct:0},

{question:"『reach out』の意味は？",
answers:["怒鳴る","連絡する・助けを求める","隠れる","出発する"],
correct:1},

{question:"『come out』の意味は？",
answers:["出てくる・公表される","泊まる","閉じる","失う"],
correct:0},

];

const adjective =[

{question:"『potent』の意味は？",
answers:["危険な","強力な","退屈な","柔らかい"],
correct:1},

{question:"『shaky』の意味は？",
answers:["明るい","不安定な","強い","静かな"],
correct:1},

{question:"『lurking』の意味は？",
answers:["走っている","潜んでいる","飛んでいる","笑っている"],
correct:1},
];

const expressions =[

{question:"『in the same boat』の意味は？",
answers:["同じ船に乗る","同じ状況・境遇にいる","海へ行く","助け合う"],
correct:1},
];





function selectCategory(category){

    if(category === "noun"){
        quizData = [...nouns];
    }

    else if(category === "verb"){
        quizData = [...verbs];
    }

    else if(category === "adjective"){
        quizData = [...adjective];
    }

    else if(category === "expression"){
        quizData = [...expressions];
    }

    else{
        quizData = [
            ...nouns,
            ...verbs,
            ...adjective,
            ...expressions
        ];
    }

    if(quizData.length === 0){
        document.getElementById(
            "question"
        ).textContent =
        "問題がまだありません";
        return;
    }

    quizData = quizData.map(
        shuffleQuestion
    );

    shuffleArray(quizData);

    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.getElementById(
        "score"
    ).textContent = score;

    loadQuestion();
}

/* --------------------
   問題シャッフル
-------------------- */

function shuffleQuestion(q){

    const correctAnswer =
    q.answers[q.correct];

    const shuffled =
    [...q.answers]
    .sort(() => Math.random() - 0.5);

    return {
        question: q.question,
        answers: shuffled,
        correct:
        shuffled.indexOf(correctAnswer)
    };
}

/* --------------------
   問題表示
-------------------- */

function loadQuestion(){

    document.getElementById(
    "speakBtn"
).onclick = () => {
    speakWord(
        q.question
    );
};

    const q =
    quizData[currentQuestion];

    document.getElementById(
        "question"
    ).textContent =
    q.question;

    speakWord(q.question);

    document.getElementById(
        "questionNumber"
    ).textContent =
    `Question ${
        currentQuestion + 1
    } / ${quizData.length}`;

    const answersEl =
    document.getElementById(
        "answers"
    );

    answersEl.innerHTML = "";

    document.getElementById(
        "result"
    ).textContent = "";

    document.getElementById(
        "nextBtn"
    ).style.display = "none";

    q.answers.forEach(
        (answer, index)=>{

        const button =
        document.createElement(
            "button"
        );

        button.classList.add(
            "answer-btn"
        );

        button.textContent =
        answer;

        button.addEventListener(
            "click",
            ()=>{

            const buttons =
            document.querySelectorAll(
                ".answer-btn"
            );

            buttons.forEach(
                btn =>
                btn.disabled = true
            );

            if(index === q.correct){

                button.classList.add(
                    "correct"
                );

                document.getElementById(
                    "result"
                ).textContent =
                "⭕ 正解！";

                score++;

                document.getElementById(
                    "score"
                ).textContent =
                score;

            }else{

                button.classList.add(
                    "wrong"
                );

                buttons[q.correct]
                .classList.add(
                    "correct"
                );

                document.getElementById(
                    "result"
                ).textContent =
                "❌ 不正解";

                wrongQuestions.push(q);
            }

            document.getElementById(
                "nextBtn"
            ).style.display =
            "block";
        });

        answersEl.appendChild(
            button
        );
    });
}

/* --------------------
   次の問題
-------------------- */

document.getElementById(
    "nextBtn"
).addEventListener(
    "click",
    ()=>{

    currentQuestion++;

    if(
        currentQuestion <
        quizData.length
    ){
        loadQuestion();

    }else{

        document.querySelector(
            ".quiz-container"
        ).innerHTML = `
        <h1>
        🎉 Quiz Finished!
        </h1>

        <p style="
        text-align:center;
        margin-top:20px;
        font-size:1.3rem;">

        ${quizData.length}問中
        <strong>${score}</strong>
        問正解！

        </p>

        <p style="
        text-align:center;
        margin-top:10px;">

        間違えた問題：
        ${wrongQuestions.length}問

        </p>

        <button
        class="next-btn restart-btn"
        onclick="location.reload()"
        style="display:block;
        margin-top:15px;">

        もう一回挑戦

        </button>
        `;
    }
});

/* --------------------
   配列シャッフル
-------------------- */

function shuffleArray(array){

    for(
        let i =
        array.length - 1;
        i > 0;
        i--
    ){

        const j =
        Math.floor(
            Math.random()
            * (i + 1)
        );

        [
            array[i],
            array[j]
        ] =
        [
            array[j],
            array[i]
        ];
    }
}

function speakWord(word){

    const utterance =
    new SpeechSynthesisUtterance(
        word
    );

    // 言語設定
    utterance.lang = "en-US";
    // 英語なら "en-US"
    // フランス語なら "fr-FR"

    utterance.rate = 0.9;
    utterance.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(
        utterance
    );
}
</script>
</body>
</html>
