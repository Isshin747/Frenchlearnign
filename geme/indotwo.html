body{

.quiz-container{

}

.score{

}

.question-number{

    margin-bottom:10px;
}

.question{
    font-size:1.5rem;

    margin-bottom:30px;

}

.answers{
    display:grid;
    gap:15px;
}

.answer-btn{
    border:none;

    padding:18px;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
    text-align:left;
}

.answer-btn:hover{

    transform:translateY(-2px);

.correct{

.wrong{

.next-btn{

    width:100%;
    margin-top:25px;
    border:none;
    background:#4b6fff;
    color:white;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
}

.next-btn:hover{
    background:#3457d5;
}

.restart-btn{
    background:#16a34a;
}

@media(max-width:600px){
    .quiz-container{
        padding:25px;
    }

    .question{
        font-size:1.2rem;
    }
}

    </button>

let score = 0;
function selectCategory(category){

   
    if(category === "noun"){
        quizData = [...nouns];
    }

    else if(category === "verb"){
        quizData = [...verbs];
    }

    else if(category === "adjective"){
        quizData = [...adjective];
    }

    else if(category === "expression"){
        quizData = [...expressions];
    }

    else{
        quizData = [
            ...nouns,
            ...verbs,
            ...adjective,
            ...expressions
        ];
    }

    
    currentQuestion = 0;
    score = 0;

    document.getElementById("score")
    .textContent = score;

    // ←超重要
    loadQuestion();
}

shuffleArray(quizData);

function loadQuestion(){

    if(quizData.length === 0){
        return;
    }

    const q =
    quizData[currentQuestion];

    document.getElementById("question").textContent =
        q.question;

    document.getElementById("questionNumber")
    .textContent =
    `Question ${currentQuestion + 1} / ${quizData.length}`;

    const answersEl =
        document.getElementById("answers");

    answersEl.innerHTML = "";

    document.getElementById("result")
    .textContent = "";

    document.getElementById("nextBtn")
    .style.display = "none";

    q.answers.forEach((answer,index)=>{

        const button =
        document.createElement("button");

        button.classList.add("answer-btn");

        button.textContent = answer;

        button.addEventListener("click",()=>{

            const buttons =
            document.querySelectorAll(".answer-btn");

            buttons.forEach(btn =>
                btn.disabled = true
            );

            if(index === q.correct){

                button.classList.add("correct");

                document.getElementById(
                    "result"
                ).textContent =
                "⭕ 正解！";

                score++;

                document.getElementById(
                    "score"
                ).textContent = score;

            }else{

                button.classList.add("wrong");

                buttons[q.correct]
                .classList.add("correct");

                document.getElementById(
                    "result"
                ).textContent =
                "❌ 不正解";
            }

            document.getElementById(
                "nextBtn"
            ).style.display = "block";

        });

        answersEl.appendChild(button);
    });
}

document.getElementById("nextBtn")
.addEventListener("click",()=>{

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        document.querySelector(
            ".quiz-container"
        ).innerHTML = `
        <h1>🎉 Quiz Finished!</h1>
        <p style="text-align:center;
        margin-top:20px;
        font-size:1.3rem;">
        ${quizData.length}問中
        <strong>${score}</strong>問正解！
        </p>

        <button
        class="next-btn restart-btn"
        onclick="location.reload()"
        style="display:block;">
        もう一回挑戦
        </button>
        `;
    }
});

function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j =
        Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }
}
