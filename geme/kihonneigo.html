            "question"
        ).textContent =
        "問題がまだありません";
        return;
    }

    quizData = quizData.map(
        shuffleQuestion
    );

    shuffleArray(quizData);

    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.getElementById(
        "score"
    ).textContent = score;

    loadQuestion();
}

/* --------------------
   問題シャッフル
-------------------- */

function shuffleQuestion(q){

    const correctAnswer =
    q.answers[q.correct];

    const shuffled =
    [...q.answers]
    .sort(() => Math.random() - 0.5);

    return {
        question: q.question,
        answers: shuffled,
        correct:
        shuffled.indexOf(correctAnswer)
    };
}

/* --------------------
   問題表示
-------------------- */

function loadQuestion(){

    document.getElementById(
    "speakBtn"
).onclick = () => {
    speakWord(
        q.question
    );
};

    const q =
    quizData[currentQuestion];

    document.getElementById(
        "question"
    ).textContent =
    q.question;

    speakWord(q.question);

    document.getElementById(
        "questionNumber"
    ).textContent =
    `Question ${
        currentQuestion + 1
    } / ${quizData.length}`;

    const answersEl =
    document.getElementById(
        "answers"
    );

    answersEl.innerHTML = "";

    document.getElementById(
        "result"
    ).textContent = "";

    document.getElementById(
        "nextBtn"
    ).style.display = "none";

    q.answers.forEach(
        (answer, index)=>{

        const button =
        document.createElement(
            "button"
        );

        button.classList.add(
            "answer-btn"
        );

        button.textContent =
        answer;

        button.addEventListener(
            "click",
            ()=>{

            const buttons =
            document.querySelectorAll(
                ".answer-btn"
            );

            buttons.forEach(
                btn =>
                btn.disabled = true
            );

            if(index === q.correct){

                button.classList.add(
                    "correct"
                );

                document.getElementById(
                    "result"
                ).textContent =
                "⭕ 正解！";

                score++;

                document.getElementById(
                    "score"
                ).textContent =
                score;

            }else{

                button.classList.add(
                    "wrong"
                );

                buttons[q.correct]
                .classList.add(
                    "correct"
                );

                document.getElementById(
                    "result"
                ).textContent =
                "❌ 不正解";

                wrongQuestions.push(q);
            }

            document.getElementById(
                "nextBtn"
            ).style.display =
            "block";
        });

        answersEl.appendChild(
            button
        );
    });
}

/* --------------------
   次の問題
-------------------- */

document.getElementById(
    "nextBtn"
).addEventListener(
    "click",
    ()=>{

    currentQuestion++;

    if(
        currentQuestion <
        quizData.length
    ){
        loadQuestion();

    }else{

        document.querySelector(
            ".quiz-container"
        ).innerHTML = `
        <h1>
        🎉 Quiz Finished!
        </h1>

        <p style="
        text-align:center;
        margin-top:20px;
        font-size:1.3rem;">

        ${quizData.length}問中
        <strong>${score}</strong>
        問正解！

        </p>

        <p style="
        text-align:center;
        margin-top:10px;">

        間違えた問題：
        ${wrongQuestions.length}問

        </p>

        <button
        class="next-btn restart-btn"
        onclick="location.reload()"
        style="display:block;
        margin-top:15px;">

        もう一回挑戦

        </button>
        `;
    }
});

/* --------------------
   配列シャッフル
-------------------- */

function shuffleArray(array){

    for(
        let i =
        array.length - 1;
        i > 0;
        i--
    ){

        const j =
        Math.floor(
            Math.random()
            * (i + 1)
        );

        [
            array[i],
            array[j]
        ] =
        [
            array[j],
            array[i]
        ];
    }
}

function speakWord(word){

    const utterance =
    new SpeechSynthesisUtterance(
        word
    );

    // 言語設定
    utterance.lang = "en-US";
    // 英語なら "en-US"
    // フランス語なら "fr-FR"

    utterance.rate = 0.9;
    utterance.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(
        utterance
    );
}
