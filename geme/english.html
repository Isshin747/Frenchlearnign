<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;

}

body{
    background: linear-gradient(135deg,#eef4ff,#dfe9ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.quiz-container{
    background:white;
    width:100%;
    max-width:700px;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

h1{
    text-align:center;
    color:#2c3e50;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.score{
    text-align:right;
    font-weight:bold;
    margin-bottom:20px;
    color:#444;
}

.question-number{
    color:#4b6fff;
    font-weight:bold;
    margin-bottom:10px;
}

.question{
    font-size:1.5rem;
    font-weight:bold;
    margin-bottom:30px;
    color:#222;
}

.answers{
    display:grid;
    gap:15px;
}

.answer-btn{
    border:none;
    background:#f3f6ff;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
    text-align:left;
}

.answer-btn:hover{
    background:#dfe8ff;
    transform:translateY(-2px);
}

.correct{
    background:#8ee4af !important;
    color:#14532d;
}

.wrong{
    background:#ffb3b3 !important;
    color:#7f1d1d;
}

#result{
    text-align:center;
    margin-top:20px;
    font-size:1.2rem;
    font-weight:bold;
}

.next-btn{
    display:none;
    width:100%;
    margin-top:25px;
    border:none;
    background:#4b6fff;
    color:white;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
}

.next-btn:hover{
    background:#3457d5;
}

.restart-btn{
    background:#16a34a;
}

@media(max-width:600px){
    .quiz-container{
        padding:25px;
    }

    .question{
        font-size:1.2rem;
    }
}
</style>

<div class="quiz-container">

    <h1> Language Quiz</h1>
    <p class="subtitle">
        英語日常表現クイズ
    </p>

    <div class="category-select">

    <button onclick="selectCategory('noun')">
        句動詞
    </button>

    <button onclick="selectCategory('verb')">
         スラング
    </button>

    <button onclick="selectCategory('adjective')">
         ドラマ頻出英語
    </button>

    <button onclick="selectCategory('expression')">
         短縮形
    </button>

    <button onclick="selectCategory('all')">
         全部
    </button>
    <button onclick="location.href='../index.html'">
        トップページへ
</button>

</div>

    <div class="score">
        Score: <span id="score">0</span>
    </div>

    <div class="question-number" id="questionNumber">
        Question 1 / 80
    </div>

    <div class="question" id="question">
        問題が表示されます
    </div>

    <div class="question-area">
    <h2 id="question"></h2>

    <button id="speakBtn">
        🔊 発音を聞く
    </button>
</div>

    <div class="answers" id="answers"></div>

    <div id="result"></div>

    <button class="next-btn" id="nextBtn">
        次の問題 →
    </button>

</div>

<script>

let quizData = [];
let currentQuestion = 0;
let score = 0;
let wrongQuestions = [];
function selectCategory(category){

   
    if(category === "noun"){
        quizData = [...nouns];
    }
    

    else if(category === "verb"){
        quizData = [...verbs];
    }

    else if(category === "adjective"){
        quizData = [...adjective];
    }

    else if(category === "expression"){
        quizData = [...expressions];
    }


    else{
        quizData = [
            ...nouns,
            ...verbs,
            ...adjective,
            ...expressions
        ];
    }
        quizData = quizData.map(shuffleQuestion);

    
    shuffleArray(quizData);
    
    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.getElementById("score")
    .textContent = score;

    // ←超重要
    loadQuestion();
}

function shuffleQuestion(q) {
  const correctAnswer = q.answers[q.correct];

  const shuffled = [...q.answers]
    .sort(() => Math.random() - 0.5);

  return {
    question: q.question,
    answers: shuffled,
    correct: shuffled.indexOf(correctAnswer)
  };
}

/* -------------------------
   シャッフル関数
--------------------------*/
function loadQuestion(){

    const q =
    quizData[currentQuestion];

    // 問題文
    document.getElementById(
        "question"
    ).textContent =
    q.question;

    // 音声
    speakWord(q.question);

    document.getElementById(
        "questionNumber"
    ).textContent =
    `Question ${
        currentQuestion + 1
    } / ${quizData.length}`;

    const answersEl =
    document.getElementById(
        "answers"
    );

    answersEl.innerHTML = "";

    document.getElementById(
        "result"
    ).textContent = "";

    document.getElementById(
        "nextBtn"
    ).style.display = "none";

    // ----------------------
    // 選択肢シャッフル
    // ----------------------

    const shuffledAnswers =
    q.answers.map(
        (answer,index)=>({
            text: answer,
            isCorrect:
            index === q.correct
        })
    );

    shuffleArray(
        shuffledAnswers
    );

    shuffledAnswers.forEach(
        (answerObj)=>{

        const button =
        document.createElement(
            "button"
        );

        button.classList.add(
            "answer-btn"
        );

        button.textContent =
        answerObj.text;

        button.addEventListener(
            "click",
            ()=>{

            const buttons =
            document.querySelectorAll(
                ".answer-btn"
            );

            buttons.forEach(
                btn =>
                btn.disabled = true
            );

            if(answerObj.isCorrect){

                button.classList.add(
                    "correct"
                );

                document.getElementById(
                    "result"
                ).textContent =
                "⭕ 正解！";

                score++;

                document.getElementById(
                    "score"
                ).textContent =
                score;

            }else{

                button.classList.add(
                    "wrong"
                );

                // 正解ボタン表示
                buttons.forEach(
                    (btn,index)=>{

                    if(
                        shuffledAnswers[
                            index
                        ].isCorrect
                    ){
                        btn.classList.add(
                            "correct"
                        );
                    }
                });

                document.getElementById(
                    "result"
                ).textContent =
                "❌ 不正解";

                wrongQuestions.push(
                    q
                );
            }

            document.getElementById(
                "nextBtn"
            ).style.display =
            "block";
        });

        answersEl.appendChild(
            button
        );
    });

    // speakボタン
    document.getElementById(
        "speakBtn"
    ).onclick = ()=>{

        speakWord(
            q.question
        );
    };
}

document.getElementById("nextBtn")
.addEventListener("click",()=>{

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        document.querySelector(
            ".quiz-container"
        ).innerHTML = `
        <h1>🎉 Quiz Finished!</h1>

<p style="text-align:center;
margin-top:20px;
font-size:1.3rem;">
${quizData.length}問中
<strong>${score}</strong>問正解！
</p>

<p style="text-align:center;
margin-top:10px;">
間違えた問題：${wrongQuestions.length}問
</p>

${
wrongQuestions.length > 0
? `
<button
class="next-btn"
onclick="reviewWrongQuestions()"
style="display:block;margin-top:15px;">
❌ 間違えた問題を復習
</button>
`
: ""
}

<button
class="next-btn restart-btn"
onclick="location.reload()"
style="display:block;margin-top:15px;">
もう一回挑戦
</button>
`;
    }
});

function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j =
        Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }
}

document.getElementById("question")
.textContent =
"カテゴリーを選んでください！";
function reviewWrongQuestions(){

    quizData = [...wrongQuestions];

    shuffleArray(quizData);

    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.querySelector(
        ".quiz-container"
    ).innerHTML = `
    <h1>🌍 Language Quiz</h1>

    <div class="score">
        Score:
        <span id="score">0</span>
    </div>

    <div class="question-number"
    id="questionNumber"></div>

    <div class="question"
    id="question"></div>

    <div class="answers"
    id="answers"></div>

    <div id="result"></div>

    <button
    class="next-btn"
    id="nextBtn">
    次の問題 →
    </button>
    `;

    document.getElementById(
        "nextBtn"
    ).addEventListener("click",()=>{

        currentQuestion++;

        if(currentQuestion < quizData.length){

            loadQuestion();

        }else{

            alert("復習終了！");
            location.reload();
        }
    });

    loadQuestion();
}

/* --------------------
   音声読み上げ
-------------------- */

function speakWord(word){

    const utterance =
    new SpeechSynthesisUtterance(
        word
    );

    // 言語設定
    utterance.lang = "en-US";
    // 英語なら "en-US"
    // フランス語なら "fr-FR"

    utterance.rate = 0.9;
    utterance.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(
        utterance
    );
}
