<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7032470395981540"
        crossorigin="anonymous">
    </script>

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>インドネシア語基本単語</title>

    <link rel="stylesheet" href="gaga.css">
</head>

<body>

<div class="quiz-container">

    <h1>Language Quiz</h1>

    <p class="subtitle">
        尼語：基本の４００単語
    </p>

    <div class="category-select">

        <button onclick="selectCategory('noun')">
            名詞
        </button>

        <button onclick="selectCategory('verb')">
            動詞
        </button>

        <button onclick="selectCategory('adjective')">
            形容詞
        </button>

        <button onclick="selectCategory('expression')">
            表現
        </button>

        <button onclick="selectCategory('all')">
            全部
        </button>

        <button onclick="location.href='../index.html'">
            トップページへ
        </button>

    </div>

    <div class="score">
        Score:
        <span id="score">0</span>
    </div>

    <div class="question-number"
    id="questionNumber">
        Question 1 / 0
    </div>

    <div class="question"
    id="question">
        カテゴリーを選んでください！
    </div>

    <div class="answers"
    id="answers">
    </div>

    <div class="question-area">
    <h2 id="question"></h2>

    <button id="speakBtn">
        🔊 発音を聞く
    </button>
</div>

    <div id="result"></div>

    <button
    class="next-btn"
    id="nextBtn">
        次の問題 →
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
