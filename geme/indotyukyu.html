.quiz-container{

.answer-btn{

.answer-btn:hover{

.correct{

.wrong{

.next-btn{

.next-btn:hover{

}

.restart-btn{
    background:#16a34a;
}

    .quiz-container{
        padding:25px;
    }

        font-size:1.2rem;
    }
}

</button>

</div>

        次の問題 →

</div>

<script>

let quizData = [];
let currentQuestion = 0;
let score = 0;
let wrongQuestions = [];
function selectCategory(category){

   
    if(category === "noun"){
        quizData = [...nouns];
    }

    else if(category === "verb"){
        quizData = [...verbs];
    }

    else if(category === "adjective"){
        quizData = [...adjective];
    }

    else if(category === "expression"){
        quizData = [...expressions];
    }

    else{
        quizData = [
            ...nouns,
            ...verbs,
            ...adjective,
            ...expressions
        ];
    }
    shuffleArray(quizData);
    
    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.getElementById("score")
    .textContent = score;

    // ←超重要
    loadQuestion();
}

function loadQuestion(){

    const q =
    quizData[currentQuestion];

    // 問題文
    document.getElementById(
        "question"
    ).textContent =
    q.question;

    // 音声
    speakWord(q.question);

    document.getElementById(
        "questionNumber"
    ).textContent =
    `Question ${
        currentQuestion + 1
    } / ${quizData.length}`;

    const answersEl =
    document.getElementById(
        "answers"
    );

    answersEl.innerHTML = "";

    document.getElementById(
        "result"
    ).textContent = "";

    document.getElementById(
        "nextBtn"
    ).style.display = "none";

    // ----------------------
    // 選択肢シャッフル
    // ----------------------

    const shuffledAnswers =
    q.answers.map(
        (answer,index)=>({
            text: answer,
            isCorrect:
            index === q.correct
        })
    );

    shuffleArray(
        shuffledAnswers
    );

    shuffledAnswers.forEach(
        (answerObj)=>{

        const button =
        document.createElement(
            "button"
        );

        button.classList.add(
            "answer-btn"
        );

        button.textContent =
        answerObj.text;

        button.addEventListener(
            "click",
            ()=>{

            const buttons =
            document.querySelectorAll(
                ".answer-btn"
            );

            buttons.forEach(
                btn =>
                btn.disabled = true
            );

            if(answerObj.isCorrect){

                button.classList.add(
                    "correct"
                );

                document.getElementById(
                    "result"
                ).textContent =
                "⭕ 正解！";

                score++;

                document.getElementById(
                    "score"
                ).textContent =
                score;

            }else{

                button.classList.add(
                    "wrong"
                );

                // 正解ボタン表示
                buttons.forEach(
                    (btn,index)=>{

                    if(
                        shuffledAnswers[
                            index
                        ].isCorrect
                    ){
                        btn.classList.add(
                            "correct"
                        );
                    }
                });

                document.getElementById(
                    "result"
                ).textContent =
                "❌ 不正解";

                wrongQuestions.push(
                    q
                );
            }

            document.getElementById(
                "nextBtn"
            ).style.display =
            "block";
        });

        answersEl.appendChild(
            button
        );
    });

    // speakボタン
    document.getElementById(
        "speakBtn"
    ).onclick = ()=>{

        speakWord(
            q.question
        );
    };
}


document.getElementById("nextBtn")
.addEventListener("click",()=>{

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        document.querySelector(

<button

`

<button
class="next-btn restart-btn"

`;

function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j =
        Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }
}

document.getElementById("question")
.textContent =
"カテゴリーを選んでください！";
function reviewWrongQuestions(){

    quizData = [...wrongQuestions];

    shuffleArray(quizData);

    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.querySelector(
        ".quiz-container"
    ).innerHTML = `
    <h1>🌍 Language Quiz</h1>

    <div class="score">
        Score:
        <span id="score">0</span>
    </div>

    <div class="question-number"
    id="questionNumber"></div>

    <div class="question"
    id="question"></div>

    <div class="answers"
    id="answers"></div>

    <div id="result"></div>

    <button
    class="next-btn"
    id="nextBtn">
    次の問題 →
    </button>
    `;

    document.getElementById(
        "nextBtn"
    ).addEventListener("click",()=>{

        currentQuestion++;

        if(currentQuestion < quizData.length){

            loadQuestion();

        }else{

            alert("復習終了！");
            location.reload();
        }
    });

    loadQuestion();
}

-------------------- */

function speakWord(word){

    const utterance =
    new SpeechSynthesisUtterance(
        word
    );

    // 言語設定
    utterance.lang = "id-ID";
    // 英語なら "en-US"
    // フランス語なら "fr-FR"

    utterance.rate = 0.9;
    utterance.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(
        utterance
    );
}
