.next-btn:hover{

        ⌛ 形容詞
    </button>

    <button onclick="selectCategory('expression')">
        💬 副詞・接続詞・慣用句
    </button>

    <button onclick="selectCategory('all')">
        ✨ 全部
    </button>

</button>

</div>

        次の問題 →

</div>

<script>

let quizData = [];
let currentQuestion = 0;
let score = 0;
let wrongQuestions = [];
function selectCategory(category){

   
    if(category === "noun"){
        quizData = [...nouns];
    }
    else if(category ==="nountwo"){
        quizData = [...nountwos];
    }
    else if(category ==="nounthree"){
        quizData = [...nounthrees];
    }
    else if(category ==="nounfour"){
        quizData = [...nounfours];
    }

    else if(category === "verb"){
        quizData = [...verbs];
    }

    else if(category === "adjective"){
        quizData = [...adjective];
    }

    else if(category === "expression"){
        quizData = [...expressions];
    }


    else{
        quizData = [
            ...nouns,
            ...nountwos,
            ...nounthrees,
            ...nounfours,
            ...verbs,
            ...adjective,
            ...expressions
        ];
    }
        quizData = quizData.map(shuffleQuestion);

    
    shuffleArray(quizData);
    
    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.getElementById("score")
    .textContent = score;

    // ←超重要
    loadQuestion();
}

function shuffleQuestion(q) {
  const correctAnswer = q.answers[q.correct];

  const shuffled = [...q.answers]
    .sort(() => Math.random() - 0.5);

  return {
    question: q.question,
    answers: shuffled,
    correct: shuffled.indexOf(correctAnswer)
  };
}

function loadQuestion(){

    if(quizData.length === 0){
        return;
    }

    const q =
    quizData[currentQuestion];

    document.getElementById("question").textContent =
        q.question;

    document.getElementById("questionNumber")
    .textContent =
    `Question ${currentQuestion + 1} / ${quizData.length}`;

    const answersEl =
        document.getElementById("answers");

    answersEl.innerHTML = "";

    document.getElementById("result")
    .textContent = "";

    document.getElementById("nextBtn")
    .style.display = "none";

    q.answers.forEach((answer,index)=>{

        const button =
        document.createElement("button");

        button.classList.add("answer-btn");

        button.textContent = answer;

        button.addEventListener("click",()=>{

            const buttons =
            document.querySelectorAll(".answer-btn");

            buttons.forEach(btn =>
                btn.disabled = true
            );

            if(index === q.correct){

                button.classList.add("correct");

                document.getElementById(
                    "result"
                ).textContent =
                "⭕ 正解！";

                score++;

                document.getElementById(
                    "score"
                ).textContent = score;

            }else{

                button.classList.add("wrong");

                buttons[q.correct]
                .classList.add("correct");

                document.getElementById(
                    "result"
                ).textContent =
                "❌ 不正解";
                 wrongQuestions.push(q);
            }

            document.getElementById(
                "nextBtn"
            ).style.display = "block";

        });

        answersEl.appendChild(button);
    });
}

document.getElementById("nextBtn")
.addEventListener("click",()=>{

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        document.querySelector(
            ".quiz-container"
        ).innerHTML = `
        <h1>🎉 Quiz Finished!</h1>

<p style="text-align:center;
margin-top:20px;
font-size:1.3rem;">
${quizData.length}問中
<strong>${score}</strong>問正解！
</p>

<p style="text-align:center;
margin-top:10px;">
間違えた問題：${wrongQuestions.length}問
</p>

${
wrongQuestions.length > 0
? `
<button
class="next-btn"
onclick="reviewWrongQuestions()"
style="display:block;margin-top:15px;">
❌ 間違えた問題を復習
</button>
`
: ""
}

<button
class="next-btn restart-btn"
onclick="location.reload()"
style="display:block;margin-top:15px;">
もう一回挑戦
</button>
`;
    }
});

function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j =
        Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }
}

document.getElementById("question")
.textContent =
"カテゴリーを選んでください！";
function reviewWrongQuestions(){

    quizData = [...wrongQuestions];

    shuffleArray(quizData);

    currentQuestion = 0;
    score = 0;
    wrongQuestions = [];

    document.querySelector(
        ".quiz-container"
    ).innerHTML = `
    <h1>🌍 Language Quiz</h1>

    <div class="score">
        Score:
        <span id="score">0</span>
    </div>

    <div class="question-number"
    id="questionNumber"></div>

    <div class="question"
    id="question"></div>

    <div class="answers"
    id="answers"></div>

    <div id="result"></div>

    <button
    class="next-btn"
    id="nextBtn">
    次の問題 →
    </button>
    `;

    document.getElementById(
        "nextBtn"
    ).addEventListener("click",()=>{

        currentQuestion++;

        if(currentQuestion < quizData.length){

            loadQuestion();

        }else{

            alert("復習終了！");
            location.reload();
        }
    });

    loadQuestion();
}
