<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Hub</title>
  <link rel="stylesheet" href="steel.css">
</head>

<body>

  <div class="container">

    <h1>Story Hub</h1>
    <p class="subtitle">
      Share your language stories with the world.
    </p>

    <button id="loginBtn">Login with Google</button>
    <p id="user"></p>

    <!-- タブ -->
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="showList()">
        📚 Stories
      </button>

      <button class="tab-btn" onclick="showWrite()">
        ✍️ Write
      </button>
    </div>

    <!-- List -->
    <div id="listView">
      <h2>Latest Stories</h2>
      <div id="toc"></div>
    </div>

    <!-- Read -->
    <div id="readView" style="display:none;">
      <button class="back-btn" onclick="showList()">
        ← Back
      </button>

      <h2 id="viewTitle"></h2>
      <p id="viewMeta"></p>
      <p id="viewContent"></p>
    </div>

    <!-- Write -->
    <div id="writeView" style="display:none;">
      <h2>Write Your Story</h2>

      <input id="title" placeholder="Story title">

      <select id="language">
        <option>English</option>
        <option>French</option>
        <option>Indonesian</option>
      </select>

      <select id="genre">
        <option>Novel</option>
        <option>Diary</option>
        <option>Essay</option>
      </select>

      <textarea id="content" placeholder="Write your story here..."></textarea>

      <button id="postBtn">
        Post Story
      </button>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
