<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>語順並び替えクイズ</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:30px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:35px;
    box-shadow:
        0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
    font-size:2rem;
}

#progress{
    background:#eef2ff;
    color:#4f46e5;
    padding:10px 15px;
    border-radius:12px;
    font-weight:bold;
    margin-bottom:20px;
}

#question{
    background:#f8fafc;
    padding:20px;
    border-radius:15px;
    font-size:1.7rem;
    text-align:center;
    margin-bottom:20px;
    border-left:6px solid #667eea;
}

h3{
    color:#555;
}

#answerArea{
    min-height:100px;
    border:3px dashed #667eea;
    background:#f8faff;
    border-radius:15px;
    padding:20px;
    margin-bottom:25px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    font-size:36px;
    font-weight:bold;
}

#choices{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.word-btn{
    background:white;
    border:none;
    border-radius:50px;
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    transition:.2s;
}

.word-btn:hover{
    transform:translateY(-3px);
    background:#667eea;
    color:white;
}

.action-btn{
    border:none;
    border-radius:12px;
    padding:12px 25px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
    margin-right:10px;
}

#resetBtn{
    background:#f59e0b;
    color:white;
}

#resetBtn:hover{
    background:#d97706;
}

#checkBtn{
    background:#10b981;
    color:white;
}

#checkBtn:hover{
    background:#059669;
}

#nextBtn{
    background:#6366f1;
    color:white;
}

#nextBtn:hover{
    background:#4f46e5;
}

#result{
    margin-top:25px;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
}

.correct{
    background:#dcfce7;
    color:#15803d;
}

.wrong{
    background:#fee2e2;
    color:#b91c1c;
}

@media(max-width:600px){

    .container{
        padding:20px;
    }

    #question{
        font-size:1.3rem;
    }

    .word-btn{
        font-size:16px;
        padding:10px 15px;
    }

}

</style>

</head>
<body>

<div class="container">

<h1>インドネシア語B1レベル並び替え問題</h1>

<div id="progress"></div>

<div id="question"></div>

<div id="choices"></div>
<h3>並び替えエリア</h3>
<div id="answerArea"></div>



<button id="undoBtn" class="action-btn">
← 戻す
</button>

<button id="checkBtn" class="action-btn">
回答する
</button>

<div id="result"></div>

<button id="nextBtn"
class="action-btn"
style="display:none;">
次へ →
</button>

</div>

<script src="inndonesianarabikaequestionb1.js"></script>
<script src="narabike.js"></script>

</body>
</html>
