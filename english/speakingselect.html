
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speaking Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f8fafc;
    color:#1e293b;
}

header{
    text-align:center;
    padding:80px 20px 50px;
}

header h1{
    font-size:3rem;
    font-weight:700;
    margin-bottom:15px;
}

header p{
    font-size:1.1rem;
    color:#64748b;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:0 20px 80px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    text-decoration:none;
    color:inherit;

    border:1px solid #e2e8f0;

    transition:
    transform .2s ease,
    box-shadow .2s ease,
    border-color .2s ease;
}

.card:hover{
    transform:translateY(-6px);

    border-color:#2563eb;

    box-shadow:
    0 15px 35px rgba(37,99,235,.12);
}

.card h2{
    font-size:1.4rem;
    margin-bottom:12px;
}

.card p{
    color:#64748b;
    line-height:1.6;
}

.badge{
    display:inline-block;

    font-size:.8rem;
    font-weight:600;

    padding:6px 12px;

    border-radius:999px;

    background:#eff6ff;
    color:#2563eb;

    margin-bottom:18px;
}

footer{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

</style>
</head>
<body>

<header>

    <h1>繰り返しフレーズ練習</h1>

    <p>
        Choose a category and improve your speaking skills through repeated practice.
    </p>

</header>

<div class="container">

    <div class="grid">

        <a href="speaking.html" class="card">
            <span class="badge">Category</span>
            <h2>初級日常会話</h2>
            <p>
                Practice expressions used in everyday situations and natural conversations.
            </p>
        </a>

       

    </div>

</div>

<footer>
    Speaking Practice
</footer>

</body>
</html>
